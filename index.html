<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apprendre en s'amusant — eleves.ca</title>
<link rel="stylesheet" href="charte.css">
<style>
  body {
    justify-content: flex-start;
    gap: 0;
  }

  .entete {
    text-align: center;
    margin-bottom: 32px;
    margin-top: 8px;
  }

  .titre-hub {
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 700;
    color: #1a237e;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .sous-titre-hub {
    font-size: clamp(13px, 2.5vw, 16px);
    color: #888;
    font-weight: 400;
  }

  .grille-jeux {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 780px;
  }

  .carte-jeu {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 28px 16px 22px;
    background: white;
    border: 3px solid #1976d2;
    border-radius: 20px;
    text-decoration: none;
    color: #1a237e;
    box-shadow: 0 4px 14px rgba(25,118,210,0.15);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  .carte-jeu:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(25,118,210,0.25);
  }

  .carte-jeu:active {
    transform: translateY(-1px);
  }

  .carte-jeu.desactivee {
    opacity: 0.45;
    cursor: not-allowed;
    pointer-events: none;
    border-color: #bdbdbd;
    box-shadow: none;
  }

  .carte-icone {
    font-size: clamp(40px, 8vw, 54px);
    line-height: 1;
  }

  .carte-titre {
    font-size: clamp(13px, 2.5vw, 16px);
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
    color: #1a237e;
  }

  .carte-badge {
    font-size: 11px;
    color: #888;
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 2px 12px;
    font-weight: 600;
  }

  .pied {
    margin-top: 40px;
    font-size: 12px;
    color: #aaa;
    text-align: center;
  }

  @media (hover: none) and (pointer: coarse) {
    .carte-jeu:hover { transform: none; box-shadow: 0 4px 14px rgba(25,118,210,0.15); }
    .carte-jeu { min-height: 44px; }
  }
</style>
</head>
<body>

<div class="entete">
  <div class="titre-hub">Apprendre en s'amusant</div>
  <div class="sous-titre-hub">eleves.ca</div>
</div>

<div class="grille-jeux">

  <a href="mois.html" class="carte-jeu">
    <div class="carte-icone">🗓️</div>
    <div class="carte-titre">Les mois de l'année</div>
  </a>

  <div class="carte-jeu desactivee">
    <div class="carte-icone">📅</div>
    <div class="carte-titre">Les jours de la semaine</div>
    <div class="carte-badge">Bientôt disponible</div>
  </div>

  <a href="dates.html" class="carte-jeu">
    <div class="carte-icone">📆</div>
    <div class="carte-titre">Hier, aujourd'hui, demain</div>
  </a>

  <a href="clavier.html" class="carte-jeu">
    <div class="carte-icone">⌨️</div>
    <div class="carte-titre">Le clavier</div>
  </a>

</div>

<div class="pied">eleves.ca — Apprendre en s'amusant</div>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les jours de la semaine — eleves.ca</title>
<link rel="stylesheet" href="charte.css">
<style>
  .titre {
    font-size: clamp(18px, 4vw, 26px);
    font-weight: 700;
    color: #1a237e;
    margin-bottom: 8px;
    text-align: center;
    line-height: 1.3;
  }

  .slot-col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Grille 7 colonnes spécifique à ce jeu */
  .grille-slots-7 {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 720px;
    margin-bottom: 8px;
  }

  /* Rondelles adaptées aux noms de jours */
  .rondelle {
    width: clamp(52px, 12vw, 90px);
    height: clamp(52px, 12vw, 90px);
    font-size: clamp(8px, 1.8vw, 13px);
  }

  .smiley {
    margin-top: 4px;
    animation: popIn 0.3s ease;
  }

  .message {
    font-size: clamp(20px, 5vw, 42px);
    font-weight: 700;
    margin: 10px 0;
    text-align: center;
    animation: apparition 0.5s ease;
  }

  .message-err { color: #d32f2f; }

  .pied-page {
    margin-top: 24px;
    font-size: 12px;
    color: #666;
    text-align: center;
  }
</style>
</head>
<body class="matiere-francais">

<div class="titre">📅 Place les jours de la semaine dans l'ordre.</div>

<button class="btn-audio" id="btnAudio" onclick="jouerConsigne()" title="Écouter la consigne">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#f57f17" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
  </svg>
</button>

<div class="grille-slots-7" id="slotsJours"></div>
<div id="messageResultat"></div>

<div class="zone-pool" id="pool"></div>

<div class="rangee-boutons">
  <button class="btn-secondaire" onclick="recommencer()">🔄 Recommencer</button>
  <a href="index.html" class="btn-navigation">← Retour au menu</a>
</div>

<div class="pied-page">Clique sur une rondelle pour entendre son nom. Glisse chaque jour dans la bonne position !</div>

<div class="fantome-tactile" id="fantome"></div>

<audio id="audioConsigne" preload="auto">
  <source src="assets/audio/consigne-jours.mp3" type="audio/mpeg">
</audio>

<script>
// ============ DONNÉES ============
const JOURS = [
  'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi', 'dimanche'
];

const ORDINAUX = [
  "premier jour de la semaine",
  "deuxième jour de la semaine",
  "troisième jour de la semaine",
  "quatrième jour de la semaine",
  "cinquième jour de la semaine",
  "sixième jour de la semaine",
  "septième jour de la semaine"
];

let melanges = [];
let placements = Array(7).fill(null);
let resultats = null;
let verified = false;

let dragJour = null;
let dragSource = null;
let touchInfo = null;
let isDragging = false;
let dragStartPos = null;
const DRAG_THRESHOLD = 10;

// ============ SYNTHÈSE VOCALE ============
let voixFR = null;

function chargerVoixFR() {
  const voix = window.speechSynthesis.getVoices();
  voixFR = voix.find(v => v.lang.startsWith("fr")) || null;
}

if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = chargerVoixFR;
  chargerVoixFR();
}

function dire(texte, vitesse) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(texte);
  u.lang = "fr-FR";
  u.rate = vitesse || 0.85;
  if (voixFR) u.voice = voixFR;
  window.speechSynthesis.speak(u);
}

function direJour(nom, el) {
  dire(nom, 0.82);
  pulseElement(el);
}

function direOrdinal(index, el) {
  dire(ORDINAUX[index], 0.82);
  pulseElement(el);
}

function pulseElement(el) {
  if (!el) return;
  el.classList.remove("lecture");
  void el.offsetWidth;
  el.classList.add("lecture");
}

// ============ AUDIO CONSIGNE ============
const audioEl = document.getElementById("audioConsigne");
const btnAudio = document.getElementById("btnAudio");
let useSynthese = false;

audioEl.addEventListener("error", function() { useSynthese = true; });

function jouerConsigne() {
  btnAudio.classList.add("lecture");
  if (useSynthese || !audioEl.src || audioEl.error) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(
        "Place les jours de la semaine dans l'ordre, du premier au dernier jour."
      );
      u.lang = "fr-FR";
      u.rate = 0.82;
      if (voixFR) u.voice = voixFR;
      u.onend = () => btnAudio.classList.remove("lecture");
      u.onerror = () => btnAudio.classList.remove("lecture");
      window.speechSynthesis.speak(u);
    } else {
      btnAudio.classList.remove("lecture");
    }
  } else {
    audioEl.currentTime = 0;
    audioEl.play().catch(() => { useSynthese = true; jouerConsigne(); });
    audioEl.onended = () => btnAudio.classList.remove("lecture");
  }
}

// ============ SMILEYS ============
function smileyVertSVG() {
  return '<svg width="28" height="28" viewBox="0 0 28 28">' +
    '<circle cx="14" cy="14" r="13" fill="#4caf50" stroke="#2e7d32" stroke-width="1.5"/>' +
    '<circle cx="9" cy="11" r="2" fill="white"/>' +
    '<circle cx="19" cy="11" r="2" fill="white"/>' +
    '<path d="M 8 17 Q 14 23 20 17" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>' +
    '</svg>';
}

function smileyOrangeSVG() {
  return '<svg width="28" height="28" viewBox="0 0 28 28">' +
    '<circle cx="14" cy="14" r="13" fill="#ff9800" stroke="#e65100" stroke-width="1.5"/>' +
    '<circle cx="9" cy="11" r="2" fill="white"/>' +
    '<circle cx="19" cy="11" r="2" fill="white"/>' +
    '<path d="M 8 21 Q 14 15 20 21" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>' +
    '</svg>';
}

// ============ UTILITAIRES ============
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============ RENDU ============
function render() {
  const joursDansPool = melanges.filter(j => !placements.includes(j));

  renderSlots("slotsJours", 0, 7);

  const poolEl = document.getElementById("pool");
  poolEl.innerHTML = "";

  if (joursDansPool.length === 0 && !verified) {
    poolEl.innerHTML = '<span style="color:#999;font-size:14px;font-style:italic;align-self:center;">Tous les jours sont placés !</span>';
  } else {
    joursDansPool.forEach(jour => {
      const el = document.createElement("div");
      el.className = "rondelle active";
      el.textContent = jour;
      el.draggable = true;

      el.addEventListener("click", () => { if (!isDragging) direJour(jour, el); });

      el.addEventListener("dragstart", () => { isDragging = true; dragJour = jour; dragSource = "pool"; });
      el.addEventListener("dragend", () => { setTimeout(() => isDragging = false, 50); });

      attacherTactile(el, jour, "pool");

      poolEl.appendChild(el);
    });
  }

  // Message résultat
  const msgEl = document.getElementById("messageResultat");
  msgEl.innerHTML = "";

  if (verified && resultats) {
    const toutCorrect = resultats.every(r => r);
    if (toutCorrect) {
      const couleurs = ["#1976d2","#d32f2f","#7b1fa2","#388e3c","#f57c00","#1976d2","#d32f2f","#388e3c"];
      const lettres = "BRAVO!!!".split("").map((c, i) =>
        '<span class="bravo-lettre" style="color:' + couleurs[i] + ';animation-delay:' + (i * 0.08) + 's">' + c + '</span>'
      ).join("");
      msgEl.innerHTML = '<div class="message">🎉 ' + lettres + ' 🎉</div>';
      setTimeout(() => dire("Bravo! Beau travail!", 0.9), 300);
    } else {
      msgEl.innerHTML = '<div class="message message-err">Il y a des erreurs, essaie encore.</div>';
      setTimeout(() => dire("Il y a des erreurs, essaie encore.", 0.82), 300);
    }
  }
}

function renderSlots(containerId, start, end) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  for (let i = start; i < end; i++) {
    const col = document.createElement("div");
    col.className = "slot-col";

    const slot = document.createElement("div");
    const jour = placements[i];
    slot.className = "rondelle " + (jour ? "active" : "vide");
    slot.textContent = jour || ("jour " + (i + 1));
    slot.dataset.slotIndex = i;

    // Clic : dire le jour (actif) ou l'ordinal (vide)
    slot.addEventListener("click", () => {
      if (isDragging) return;
      if (jour) direJour(jour, slot);
      else direOrdinal(i, slot);
    });

    // Drop souris
    slot.addEventListener("dragover", (e) => { e.preventDefault(); slot.classList.add("survol"); });
    slot.addEventListener("dragleave", () => slot.classList.remove("survol"));
    slot.addEventListener("drop", (e) => { e.preventDefault(); slot.classList.remove("survol"); deposerDansSlot(i); });

    if (jour) {
      slot.draggable = true;
      slot.addEventListener("dragstart", () => { isDragging = true; dragJour = jour; dragSource = i; });
      slot.addEventListener("dragend", () => { setTimeout(() => isDragging = false, 50); });
      attacherTactile(slot, jour, i);
    } else {
      // Tap sur rondelle vide
      slot.addEventListener("touchstart", (e) => {
        dragStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        isDragging = false;
      }, { passive: true });
      slot.addEventListener("touchend", () => {
        if (!isDragging && dragStartPos) direOrdinal(i, slot);
        dragStartPos = null;
        isDragging = false;
      });
    }

    col.appendChild(slot);

    if (verified && resultats && jour) {
      const smiley = document.createElement("div");
      smiley.className = "smiley";
      smiley.innerHTML = resultats[i] ? smileyVertSVG() : smileyOrangeSVG();
      col.appendChild(smiley);
    }

    container.appendChild(col);
  }
}

// ============ TACTILE — distinguer tap vs glisser ============
function attacherTactile(el, jour, source) {
  el.addEventListener("touchstart", (e) => {
    dragStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    isDragging = false;
    dragJour = jour;
    dragSource = source;
  }, { passive: true });

  el.addEventListener("touchmove", (e) => {
    if (!dragStartPos) return;
    const dx = e.touches[0].clientX - dragStartPos.x;
    const dy = e.touches[0].clientY - dragStartPos.y;
    if (Math.abs(dx) + Math.abs(dy) > DRAG_THRESHOLD && !isDragging) {
      isDragging = true;
      lancerFantome(e.touches[0].clientX, e.touches[0].clientY, jour);
    }
    if (isDragging) {
      e.preventDefault();
      bougerFantome(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: false });

  el.addEventListener("touchend", (e) => {
    if (!isDragging && dragStartPos) {
      direJour(jour, el);
    } else if (isDragging) {
      finirTactile();
    }
    dragStartPos = null;
    isDragging = false;
  });
}

// ============ LOGIQUE DE JEU ============
function deposerDansSlot(idx) {
  if (!dragJour) return;
  const prev = placements[idx];
  if (typeof dragSource === "number") {
    placements[dragSource] = prev;
  }
  placements[idx] = dragJour;
  dragJour = null;
  dragSource = null;
  verified = false;
  resultats = null;
  render();
  verifierSiComplet();
}

function deposerDansPool() {
  if (!dragJour || dragSource === "pool") return;
  if (typeof dragSource === "number") {
    placements[dragSource] = null;
  }
  dragJour = null;
  dragSource = null;
  verified = false;
  resultats = null;
  render();
}

function verifierSiComplet() {
  if (placements.every(j => j !== null)) {
    setTimeout(verifier, 400);
  }
}

function verifier() {
  resultats = placements.map((j, i) => j === JOURS[i]);
  verified = true;
  render();
}

function recommencer() {
  melanges = shuffle(JOURS);
  placements = Array(7).fill(null);
  resultats = null;
  verified = false;
  render();
}

// ============ FANTÔME TACTILE ============
const fantome = document.getElementById("fantome");

function lancerFantome(x, y, jour) {
  fantome.textContent = jour;
  fantome.style.display = "flex";
  fantome.style.left = (x - 40) + "px";
  fantome.style.top = (y - 40) + "px";
}

function bougerFantome(x, y) {
  fantome.style.left = (x - 40) + "px";
  fantome.style.top = (y - 40) + "px";
  touchInfo = { x, y };
  document.querySelectorAll(".rondelle").forEach(s => s.classList.remove("survol"));
  const el = document.elementFromPoint(x, y);
  if (el) {
    const slotEl = el.closest("[data-slot-index]");
    if (slotEl) slotEl.classList.add("survol");
  }
}

function finirTactile() {
  document.querySelectorAll(".rondelle").forEach(s => s.classList.remove("survol"));
  if (touchInfo) {
    const el = document.elementFromPoint(touchInfo.x, touchInfo.y);
    if (el) {
      const slotEl = el.closest("[data-slot-index]");
      const poolEl = el.closest(".zone-pool");
      if (slotEl) deposerDansSlot(parseInt(slotEl.dataset.slotIndex));
      else if (poolEl) deposerDansPool();
    }
  }
  touchInfo = null;
  dragJour = null;
  dragSource = null;
  fantome.style.display = "none";
}

// Drop sur le pool (souris)
document.getElementById("pool").addEventListener("dragover", (e) => e.preventDefault());
document.getElementById("pool").addEventListener("drop", (e) => { e.preventDefault(); deposerDansPool(); });

// ============ INIT ============
recommencer();
</script>
